version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: spreetail-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: spreetail
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: spreetail-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/spreetail?schema=public
      - JWT_SECRET=supersecretjwtkey123456
      - PORT=5000
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: spreetail-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
